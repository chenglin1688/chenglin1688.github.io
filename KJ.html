<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>深空蓝 · 发布页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #1a2639 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-card {
            max-width: 440px;
            width: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 40px;
            padding: 40px 28px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(56, 189, 248, 0.1) inset;
        }
        h1 {
            font-size: 30px;
            font-weight: 600;
            background: linear-gradient(to right, #e0f2fe, #bae6fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .sub {
            font-size: 15px;
            color: #D4AF37;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            padding-bottom: 20px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 50px;
            padding: 16px 26px;
            margin-bottom: 18px;
            text-decoration: none;
            color: white;
            transition: all 0.25s ease;
            backdrop-filter: blur(5px);
        }
        .btn:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px #38bdf840;
        }
        .btn-left .label {
            font-size: 14px;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }
        .btn-left .title {
            font-size: 17px;
            font-weight: 500;
            color: #f1f5f9;
            margin-top: 3px;
        }
        .arrow {
            font-size: 24px;
            color: #38bdf8;
        }
        .footer-note {
            margin-top: 30px;
            color: #94a3b8;
            border-top: 1px solid rgba(56, 189, 248, 0.2);
            padding-top: 25px;
            font-size: 14px;
        }
        .shortcut {
            background: #1e2b3c;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 12px;
            color: #b0c4de;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid #2d3a4c;
        }
        .copyright {
            margin-top: 20px;
            font-size: 12px;
            color: #4b5b73;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>然百捷网络科技</h1>        <!-- 替换标题 -->
        <div class="sub">分享高效实战干货 省时省力轻松变现</div>

        <a href="https://example.com" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">然百捷效率工具箱</div>
                <div class="title">点击直达</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="https://example.com" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">然百捷免费资源合集</div>
                <div class="title">立即获取</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="https://example.com" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">微信公众号「然百捷网络科技」</div>
                <div class="title">关注我们</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="https://example.com" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">然百捷工具效率圈</div>
                <div class="title">欢迎加入</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="https://example.com" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">然百捷工具变现实战课</div>
                <div class="title">学了就能赚</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <!-- 可继续添加按钮 -->

        <div class="footer-note">
            <div>📌 按 Ctrl+D 收藏本站</div>
            <div class="shortcut">⭐ 加入书签 防失联</div>
        </div>
        <div class="copyright">
            © 2026 微信公众号「然百捷网络科技」
        </div>
    </div>
</body>

</html>
