<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公众号 · 然百捷网络科技</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #1a2639 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-card {
            max-width: 440px;
            width: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 40px;
            padding: 40px 28px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 1px rgba(56, 189, 248, 0.1) inset;
        }
        h1 {
            font-size: 30px;
            font-weight: 600;
            color: #D4AF37;  /* 金色标题 */
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .sub {
            font-size: 15px;
            color: #B0C4DE;  /* 亮钢蓝副标题 */
            text-align: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 40px;
            padding: 15px 22px;
            margin-bottom: 15px;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: #D4AF37;
            transform: translateY(-2px);
        }
        .btn-left .label {
            font-size: 14px;
            color: #87A9C9;  /* 灰蓝小字 */
            letter-spacing: 0.5px;
        }
        .btn-left .title {
            font-size: 17px;
            font-weight: 500;
            color: #FFFFFF;  /* 纯白大字 */
            margin-top: 3px;
        }
        .arrow {
            font-size: 24px;
            color: #D4AF37;  /* 金色箭头 */
        }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding-top: 25px;
            font-size: 14px;
        }
        .shortcut {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 12px;
            color: #D4AF37;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .copyright {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #4a4a6a;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>然百捷网络科技</h1>
        <div class="sub">分享高效实战干货 · 省时省力轻松变现</div>

        <!-- 按钮1 -->
        <a href="#" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">然百捷效率工具箱</div>
                <div class="title">点击直达</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <!-- 按钮2 -->
        <a href="#" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">然百捷免费资源合集</div>
                <div class="title">立即获取</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <!-- 按钮3 -->
        <a href="https://wmimg.com/i/2040/2026/03/69b3f03a3d237.png" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">公众号「然百捷网络科技」</div>
                <div class="title">关注我们</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <!-- 按钮4 -->
        <a href="#" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">然百捷工具效率圈</div>
                <div class="title">欢迎加入</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <!-- 按钮5 -->
        <a href="#" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">然百捷工具变现实战课</div>
                <div class="title">学了就能赚</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <!-- 按钮6 -->
        <a href="#" class="btn" target="_blank">
            <div class="btn-left">
                <div class="label">聚合发布展示页快速制作</div>
                <div class="title">小白一看就会</div>
            </div>
            <div class="arrow">→</div>
        </a>

        <div class="footer-note">
            <div>按 Ctrl+D 收藏本站</div>
            <div class="shortcut">⭐ 加入书签防失联</div>
        </div>
        <div class="copyright">
            2026 微信公众号「然百捷网络科技」
        </div>
    </div>
</body>
</html>
