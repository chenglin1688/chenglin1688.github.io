<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的地址发布页</title>
    <style>
        /* 全局样式与渐变背景 */
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(145deg, #1a1f2e 0%, #2a1f3a 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        /* 主容器 */
        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        /* 标题区域 */
        .title {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 0.95rem;
            color: #b0b0d0;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }
        /* 卡片按钮通用样式 */
        .card-link {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 18px 24px;
            margin-bottom: 20px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .card-link:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 215, 0, 0.3);
        }
        /* 卡片内部布局 */
        .card-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-left {
            text-align: left;
        }
        .card-label {
            font-size: 0.8rem;
            color: #aaa;
            letter-spacing: 0.5px;
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 500;
            margin-top: 4px;
        }
        .arrow {
            font-size: 1.8rem;
            color: #aaa;
        }
        /* 底部提示与版权 */
        .footer-note {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #6a6a8b;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 25px;
        }
        .shortcut {
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #d0d0ff;
            margin-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题部分 -->
        <h1 class="title">然百捷网络科技</h1>
        <div class="subtitle">永久导航 持续更新</div>

        <!-- 卡片链接 1 - 可替换为你的公众号 -->
        <a href="https://mp.weixin.qq.com/mp/profile_ext?action=home&__biz=Mzg5OTg1MDAxMw==&scene=124#wechat_redirect" class="card-link" target="_blank" rel="noopener">
            <div class="card-content">
                <div class="card-left">
                    <div class="card-label">关注公众号即时获取</div>
                    <div class="card-title">点击前往</div>
                </div>
                <div class="arrow">→</div>
            </div>
        </a>

        <!-- 卡片链接 2 - 可替换为你的软件/网站地址 -->
        <a href="https://www.kdocs.cn/l/cieHt41tijtx" class="card-link" target="_blank" rel="noopener">
            <div class="card-content">
                <div class="card-left">
                    <div class="card-label">高效实用软件工具，持续更新！</div>
                    <div class="card-title">点击前往</div>
                </div>
                <div class="arrow">→</div>
            </div>
        </a>

        <!-- 底部提示 -->
        <div class="footer-note">
            <div>请 Ctrl+D 收藏本页到浏览器收藏夹</div>
            <div class="shortcut">⭐ 以防迷路</div>
        </div>

        <!-- 版权信息 -->
        <div style="margin-top: 20px; font-size: 0.75rem; color: #4a4a6a;">
            © 2026 公众号「然百捷网络科技」
        </div>
    </div>
</body>

</html>
